name: Generate Next Major Preview

on:
  push:
    branches: [develop]
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Preview release type'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - alpha
          - beta
          - rc
      force_rebuild:
        description: 'Force rebuild even if no changes'
        required: false
        default: false
        type: boolean

# Security: Minimal permissions following principle of least privilege
permissions:
  contents: write
  issues: write
  pull-requests: read
  packages: write

# Prevent concurrent runs to avoid conflicts
concurrency:
  group: generate-next-preview
  cancel-in-progress: false

jobs:
  generate-preview:
    runs-on: ubuntu-latest
    
    outputs:
      preview_version: ${{ steps.version.outputs.preview_version }}
      breaking_changes_found: ${{ steps.discovery.outputs.found }}
      conflicts_detected: ${{ steps.integration.outputs.conflicts }}
      release_candidate_created: ${{ steps.release_candidate.outputs.created }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      
      - name: Configure Git
        run: |
          git config --global user.name "Release Bot"
          git config --global user.email "release-bot@example.com"
          git config --global init.defaultBranch main
      
      - name: Install dependencies
        run: |
          npm ci
          # Security: Verify package integrity
          npm audit --audit-level=high
      
      - name: Discover breaking change branches
        id: discovery
        run: |
          echo "Discovering breaking change branches..."
          
          # Fetch all remote branches to ensure they're available locally
          git fetch --all
          
          # Find all bc-<number>-* branches and sort numerically
          BC_BRANCHES=$(git branch -r | grep -E 'origin/bc-[0-9]+-' | sed 's/origin\///' | while read -r branch; do
            number=$(echo "$branch" | sed -n 's/bc-\([0-9]\+\)-.*/\1/p')
            if [[ "$number" =~ ^[0-9]+$ ]]; then
              echo "$number $branch"
            fi
          done | sort -n | awk '{print $2}' | tr '\n' ' ')
          
          echo "BC_BRANCHES=$BC_BRANCHES" >> "$GITHUB_ENV"
          
          if [[ -z "$BC_BRANCHES" ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No breaking change branches found"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found breaking change branches: $BC_BRANCHES"
          fi
      
      - name: Validate breaking change compatibility
        if: steps.discovery.outputs.found == 'true'
        id: validation
        run: |
          echo "Validating all breaking change branches against develop..."
          
          ALL_CLEAN=true
          CLEAN_BRANCHES=""
          CONFLICTED_BRANCHES=""
          VALIDATION_DETAILS=""
          
          for branch in $BC_BRANCHES; do
            echo "Validating branch: $branch"
            
            # Create temporary branch for validation
            git checkout -b "temp-validate-$branch" "origin/$branch"
            
            # Attempt rebase against develop
            if git rebase develop --no-stat; then
              echo "✅ $branch - clean rebase"
              CLEAN_BRANCHES="$CLEAN_BRANCHES $branch"
            else
              echo "❌ $branch - conflicts detected"
              
              # Capture conflict details
              CONFLICTED_FILES=$(git status --porcelain | grep "^UU\|^AA\|^DD" | awk '{print $2}' | tr '\n' ' ')
              CONFLICT_INFO="Branch: $branch\nFiles with conflicts: $CONFLICTED_FILES"
              
              if [[ -z "$VALIDATION_DETAILS" ]]; then
                VALIDATION_DETAILS="$CONFLICT_INFO"
              else
                VALIDATION_DETAILS="$VALIDATION_DETAILS\n\n$CONFLICT_INFO"
              fi
              
              CONFLICTED_BRANCHES="$CONFLICTED_BRANCHES $branch"
              git rebase --abort
              ALL_CLEAN=false
            fi
            
            # Cleanup validation branch
            git checkout develop
            git branch -D "temp-validate-$branch"
          done
          
          # Set environment variables for later steps
          echo "CLEAN_BRANCHES=$CLEAN_BRANCHES" >> "$GITHUB_ENV"
          echo "CONFLICTED_BRANCHES=$CONFLICTED_BRANCHES" >> "$GITHUB_ENV"
          echo -e "$VALIDATION_DETAILS" > validation_conflicts.txt
          
          if [[ "$ALL_CLEAN" == "true" ]]; then
            echo "all_clean=true" >> "$GITHUB_OUTPUT"
            echo "✅ All breaking change branches are conflict-free - proceeding with integration"
          else
            echo "all_clean=false" >> "$GITHUB_OUTPUT"
            echo "❌ RELEASE BLOCKED: Conflicts detected in branches:$CONFLICTED_BRANCHES"
            echo "❌ No preview release will be generated until all conflicts are resolved"
            exit 1
          fi

      - name: Create ephemeral integration branch
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        run: |
          # Create temporary integration branch from latest develop
          INTEGRATION_BRANCH="ephemeral-integration-$(date +%Y%m%d%H%M%S)"
          echo "INTEGRATION_BRANCH=$INTEGRATION_BRANCH" >> "$GITHUB_ENV"
          
          git checkout -b "$INTEGRATION_BRANCH" develop
          echo "Created ephemeral integration branch: $INTEGRATION_BRANCH"
      
      - name: Cherry-pick breaking changes
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        id: integration
        run: |
          echo "Cherry-picking breaking changes (all branches pre-validated as conflict-free)..."
          
          BREAKING_CHANGE_METADATA=""
          
          for branch in $BC_BRANCHES; do
            echo "Processing branch: $branch"
            
            # Get commits from this branch not in develop
            COMMITS=$(git rev-list --reverse "develop..origin/$branch")
            
            if [[ -z "$COMMITS" ]]; then
              echo "No commits found in $branch"
              continue
            fi
            
            # Cherry-pick each commit in chronological order
            for commit in $COMMITS; do
              COMMIT_MSG=$(git log -1 --format="%s" "$commit")
              COMMIT_BODY=$(git log -1 --format="%b" "$commit")
              echo "Applying commit: $commit ($COMMIT_MSG)"
              
              # Cherry-pick will succeed since we pre-validated
              git cherry-pick "$commit"
              echo "✅ Successfully applied: $commit"
              
              # Parse breaking change metadata if this is a breaking change commit
              if [[ "$COMMIT_MSG" == *"!"* ]] && [[ "$COMMIT_BODY" == *"BREAKING CHANGE:"* ]]; then
                # Extract structured metadata
                CATEGORY=$(echo "$COMMIT_BODY" | grep "Breaking-Change-Category:" | cut -d: -f2- | xargs)
                IMPACT=$(echo "$COMMIT_BODY" | grep "Breaking-Change-Impact:" | cut -d: -f2- | xargs)
                MIGRATION=$(echo "$COMMIT_BODY" | grep "Breaking-Change-Migration:" | cut -d: -f2- | xargs)
                AFFECTS=$(echo "$COMMIT_BODY" | grep "Breaking-Change-Affects:" | cut -d: -f2- | xargs)
                DESCRIPTION=$(echo "$COMMIT_BODY" | sed -n '/BREAKING CHANGE:/,/^$/p' | sed '1s/BREAKING CHANGE: *//' | head -n 1)
                
                # Build metadata entry
                BC_ENTRY="**${COMMIT_MSG}**\n"
                BC_ENTRY="${BC_ENTRY}- **Category**: ${CATEGORY:-Unknown}\n"
                BC_ENTRY="${BC_ENTRY}- **Impact**: ${IMPACT:-Unknown}\n"
                BC_ENTRY="${BC_ENTRY}- **Description**: ${DESCRIPTION:-No description}\n"
                if [[ -n "$MIGRATION" ]]; then
                  BC_ENTRY="${BC_ENTRY}- **Migration**: ${MIGRATION}\n"
                fi
                if [[ -n "$AFFECTS" ]]; then
                  BC_ENTRY="${BC_ENTRY}- **Affects**: ${AFFECTS}\n"
                fi
                BC_ENTRY="${BC_ENTRY}- **Branch**: \`${branch}\`\n"
                BC_ENTRY="${BC_ENTRY}- **Commit**: \`${commit:0:7}\`\n\n"
                
                BREAKING_CHANGE_METADATA="${BREAKING_CHANGE_METADATA}${BC_ENTRY}"
              fi
            done
          done
          
          # Set outputs for downstream steps - all branches successful since pre-validated
          echo "SUCCESSFUL_BRANCHES=$BC_BRANCHES" >> "$GITHUB_ENV"
          echo "BREAKING_CHANGE_METADATA<<EOF" >> "$GITHUB_ENV"
          echo -e "$BREAKING_CHANGE_METADATA" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          echo "conflicts=false" >> "$GITHUB_OUTPUT"
          echo "All breaking changes applied successfully"
      
      - name: Check for staleness
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        id: staleness
        run: |
          STALE_BRANCHES=""
          
          for branch in $BC_BRANCHES; do
            COMMITS_BEHIND=$(git rev-list --count "origin/$branch..develop")
            
            if [[ "$COMMITS_BEHIND" -gt 50 ]]; then
              echo "⚠️ $branch is $COMMITS_BEHIND commits behind develop"
              STALE_BRANCHES="$STALE_BRANCHES $branch"
            fi
          done
          
          echo "STALE_BRANCHES=$STALE_BRANCHES" >> "$GITHUB_ENV"
          
          if [[ -n "$STALE_BRANCHES" ]]; then
            echo "stale_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale_found=false" >> "$GITHUB_OUTPUT"
          fi
      
      - name: Build integrated codebase
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        run: |
          echo "Building integrated codebase..."
          
          # Run build process
          npm run build
          
          # Run tests to validate integration
          npm test
          
          echo "Build and tests completed successfully"
      
      - name: Generate preview version
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          RELEASE_TYPE="${{ github.event.inputs.release_type || 'preview' }}"
          
          case "$RELEASE_TYPE" in
            alpha) PREVIEW_VERSION="${CURRENT_VERSION}-alpha.${TIMESTAMP}" ;;
            beta)  PREVIEW_VERSION="${CURRENT_VERSION}-beta.${TIMESTAMP}" ;;
            rc)    PREVIEW_VERSION="${CURRENT_VERSION}-rc.${TIMESTAMP}" ;;
            *)     PREVIEW_VERSION="${CURRENT_VERSION}-next.${TIMESTAMP}" ;;
          esac
          
          echo "PREVIEW_VERSION=$PREVIEW_VERSION" >> "$GITHUB_ENV"
          echo "preview_version=$PREVIEW_VERSION" >> "$GITHUB_OUTPUT"
          
          # Update package.json version for publishing
          npm version "$PREVIEW_VERSION" --no-git-tag-version
          
          echo "Generated preview version: $PREVIEW_VERSION"
      
      - name: Publish preview package
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        run: |
          echo "Publishing preview package..."
          
          # Use npm publish --dry-run for testing (remove --dry-run for production)
          npm publish --dry-run --tag next --access public
          
          echo "Preview package published: $PREVIEW_VERSION"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Create release candidate branch
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        id: release_candidate
        run: |
          # Only create release candidate if all breaking changes applied successfully
          MAJOR_VERSION=$(echo "${{ steps.version.outputs.preview_version }}" | cut -d. -f1)
          NEXT_MAJOR=$((MAJOR_VERSION + 1))
          
          # Create unique RC branch name with commit SHA and shared timestamp
          # Extract timestamp from preview version to ensure consistency
          COMMIT_SHA="${{ github.sha }}"
          PREVIEW_VERSION="${{ steps.version.outputs.preview_version }}"
          TIMESTAMP=$(echo "$PREVIEW_VERSION" | grep -o '[0-9]\{14\}$')
          RC_BRANCH="release-candidate/v${NEXT_MAJOR}.0.0-${COMMIT_SHA:0:7}-${TIMESTAMP}"
          
          # Cleanup: Delete existing RC branch if it exists (ignore errors)
          git push origin --delete "$RC_BRANCH" 2>/dev/null || true
          
          # Create and push new release candidate branch
          git checkout -b "$RC_BRANCH"
          git push origin "$RC_BRANCH"
          
          echo "RC_BRANCH=$RC_BRANCH" >> "$GITHUB_ENV"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created release candidate branch: $RC_BRANCH"
      
      - name: Create GitHub release
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.PREVIEW_VERSION }}
          release_name: "Preview Release ${{ env.PREVIEW_VERSION }}"
          body: |
            # 🚀 Next Major Preview Release

            **Base commit**: ${{ github.sha }}
            **Preview version**: `${{ env.PREVIEW_VERSION }}`
            **Integration status**: ✅ All breaking changes integrated successfully

            ## Breaking Changes Included

            ${{ env.BREAKING_CHANGE_METADATA && env.BREAKING_CHANGE_METADATA || 'No breaking changes detected in commit metadata.' }}

            ## Integrated Branches
            ${{ env.SUCCESSFUL_BRANCHES }}

            ## Installation
            ```bash
            npm install @test-org/polymesh-sdk-integration-test@next
            ```

            ## Release Candidate
            ✅ Release candidate branch created: `${{ env.RC_BRANCH }}`

            ## Migration Guide
            Review the breaking change details above for specific migration instructions for each change.

            ---
            *Generated automatically by Ephemeral Next Major Release Integration*
            
            **Note**: This release includes ONLY conflict-free breaking changes. All branches were validated before integration.
          draft: false
          prerelease: true
      
      - name: Report release blocked due to conflicts
        if: steps.discovery.outputs.found == 'true' && steps.validation.outputs.all_clean == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const allBranches = process.env.BC_BRANCHES.trim().split(' ').filter(b => b);
            const cleanBranches = process.env.CLEAN_BRANCHES ? process.env.CLEAN_BRANCHES.trim().split(' ').filter(b => b) : [];
            const conflictedBranches = process.env.CONFLICTED_BRANCHES.trim().split(' ').filter(b => b);
            
            const title = `🚨 Release Blocked - Breaking Change Conflicts Detected`;
            const body = `# Release Status: BLOCKED ❌

            The preview release has been **completely blocked** due to conflicts in one or more breaking change branches.

            ## Branch Status Summary

            ${allBranches.map(branch => {
              const status = conflictedBranches.includes(branch) ? '❌ Conflicts' : '✅ Ready';
              return `- \`${branch}\`: ${status}`;
            }).join('\n')}

            ## Conflicted Branches Requiring Resolution

            ${conflictedBranches.map(branch => `- \`${branch}\``).join('\n')}

            ## Resolution Required

            **ALL conflicted branches must be resolved before ANY release can proceed.**

            For each conflicted branch:

            1. **Checkout and rebase**:
               \`\`\`bash
               git checkout ${conflictedBranches[0] || '<branch-name>'}
               git fetch origin develop
               git rebase origin/develop
               \`\`\`

            2. **Resolve conflicts manually**:
               - Edit conflicted files to resolve conflicts
               - Remove conflict markers (\`<<<<<<<\`, \`=======\`, \`>>>>>>>\`)
               - Test changes to ensure functionality

            3. **Complete rebase and update**:
               \`\`\`bash
               git add .
               git rebase --continue
               git push --force-with-lease origin <branch-name>
               \`\`\`

            4. **Manually trigger workflow** after ALL conflicts resolved:
               - Go to Actions tab
               - Select "Generate Next Major Preview" workflow
               - Click "Run workflow" button
               - Select "Run workflow" to manually trigger

            ## No Partial Releases

            This system uses **zero-tolerance conflict prevention**:
            - ❌ No preview release generated
            - ❌ No npm package published
            - ❌ No release candidate created
            - ⚠️ Manual workflow dispatch required after resolution

            ## Conflict Details

            \`\`\`
            ${fs.existsSync('validation_conflicts.txt') ? fs.readFileSync('validation_conflicts.txt', 'utf8') : 'Conflict details not available'}
            \`\`\`

            ## Why This Approach?

            **This approach ensures release integrity** - all breaking changes must be compatible before any preview is created. This prevents:
            - Incomplete releases with missing features
            - Integration issues in downstream systems
            - Confusion about which changes are included

            ---
            **Triggered by**: ${{ github.sha }}
            **Workflow**: ${{ github.run_id }}
            **Auto-generated by**: Ephemeral Next Major Release Integration
            **Need help?** Check the [process documentation](../blob/main/PROCESS.md#conflict-resolution)`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['breaking-changes', 'conflicts', 'release-blocked', 'automation']
            });
      
      - name: Report stale branches
        if: steps.staleness.outputs.stale_found == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const staleBranches = process.env.STALE_BRANCHES.trim().split(' ').filter(b => b);
            
            const title = `⚠️ Stale Breaking Change Branches Detected`;
            const body = `# Stale Breaking Change Branches

            The following breaking change branches are significantly behind develop:

            ${staleBranches.map(b => `- \`${b}\``).join('\n')}

            ## Recommendation

            Rebase these branches to avoid future conflicts:

            \`\`\`bash
            git checkout <branch-name>
            git rebase origin/develop
            git push --force-with-lease origin <branch-name>
            \`\`\`

            Branches more than 50 commits behind develop have higher conflict risk.

            ---
            **Auto-generated by**: Ephemeral Next Major Release Integration`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['breaking-changes', 'maintenance', 'low-priority']
            });
      
      - name: Comment on triggering commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sha = context.sha;
            const found = '${{ steps.discovery.outputs.found }}' === 'true';
            const allClean = '${{ steps.validation.outputs.all_clean }}' === 'true';
            const version = '${{ env.PREVIEW_VERSION }}';
            const conflictedBranches = '${{ env.CONFLICTED_BRANCHES }}';
            
            let body = '# 🤖 Next Major Preview Generation\n\n';
            
            if (!found) {
              body += '**Status**: ✅ No breaking changes found\n';
              body += '**Action**: None required - develop ready for patch/minor release\n';
            } else if (!allClean) {
              body += `**Status**: ❌ RELEASE BLOCKED - Conflicts detected\n`;
              body += `**Conflicted branches**: ${conflictedBranches}\n`;
              body += `**Action**: Resolve ALL conflicts, then manually trigger workflow\n`;
              body += `**No partial releases**: Zero-tolerance conflict prevention in effect\n`;
            } else {
              body += `**Status**: ✅ Complete preview generated\n`;
              body += `**Version**: \`${version}\`\n`;
              body += `**Release Candidate**: ${{ env.RC_BRANCH }}\n`;
              body += `**Validation**: All breaking changes pre-validated conflict-free\n`;
            }
            
            body += `\n**Workflow**: [View run](${context.payload.repository.html_url}/actions/runs/${context.runId})`;
            
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
              body: body
            });
      
      - name: Cleanup ephemeral resources
        if: always()
        run: |
          echo "Cleaning up ephemeral resources..."
          
          # Clean up temporary files
          rm -f conflict_details.txt validation_conflicts.txt
          
          # Reset to original state (ephemeral branch will be garbage collected)
          git checkout develop
          
          if [[ -n "$INTEGRATION_BRANCH" ]]; then
            git branch -D "$INTEGRATION_BRANCH" 2>/dev/null || true
          fi
          
          echo "Cleanup completed"

  # Security scanning job
  security-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run actionlint
        uses: raven-actions/actionlint@v1
        with:
          files: .github/workflows/*.yml