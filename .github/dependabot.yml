version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
    open-pull-requests-limit: 5
    reviewers:
      - 'test-release-bot'
    assignees:
      - 'test-release-bot'
    commit-message:
      prefix: 'deps'
      include: 'scope'
    groups:
      development-dependencies:
        dependency-type: 'development'
        patterns:
          - '@types/*'
          - '@typescript-eslint/*'
          - 'eslint*'
          - 'prettier'
          - 'vitest'
          - '@vitest/*'
      production-dependencies:
        dependency-type: 'production'
        patterns:
          - 'zod'
